
[general]
	#Enable winter leafless effect.
	enabled = true
	#Hide snow layer rendered above leaves hidden by this mod.
	hide_snow_above_hidden_leaves = true
	#Hide block outline when targeting blocks visually hidden by this mod.
	hide_outline_for_hidden_blocks = true

[distant_horizons]
	#EXPERIMENTAL: enable Serene Better Winter integration with Distant Horizons.
	#May cause unexpected LOD behavior on some modpacks/setups.
	#Disable if you notice stale/flickering/holey distant chunks or any other issues you suspect may be related to this integration.
	enable_experimental_dh_integration = false
	#Enable DH LOD leaf hiding. Requires enable_experimental_dh_integration=true.
	enable_dh_lod_leaf_hiding = true
	#Automatically refresh nearby DH LOD chunks when leafless season state changes.
	dh_auto_refresh_on_season_toggle = true
	#Advanced experimental fallback: delete nearby DH full-data entries while leaves are returning.
	#Can help recover stubborn stale LOD trees, but may cause temporary LOD holes on some setups.
	#Disabled by default for safety.
	dh_enable_full_data_purge_recovery = false
	#Chunk radius around players used for Distant Horizons LOD refresh.
	#Range: 1 ~ 32
	dh_refresh_radius_chunks = 8
	#Maximum chunk count refreshed per season toggle for Distant Horizons integration.
	#Range: 64 ~ 8192
	dh_refresh_chunk_cap = 1024
	#Ticks to wait after season toggle before triggering Distant Horizons LOD refresh.
	#Range: 0 ~ 400
	dh_refresh_delay_ticks = 20

