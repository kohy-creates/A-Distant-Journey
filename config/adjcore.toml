#Range: > 0
HARDCORE_RESPAWN_RADIUS = 5000

#Tools
[tools]
	#Chance (0 - 1) to prevent durability loss. Default: 0.5 (50%)
	#Set to 0 to disable or 1 to make all items unbreakable
	#Range: 0.0 ~ 1.0
	DURABILITY_SAVE_CHANCE = 0.33
	#Delay in ticks after which shield will start blocking damage
	#5 is vanilla, 0 is immediately
	#Range: > 0
	SHIELD_DELAY = 0
	#Inaccuracy of bows
	#1 is vanilla
	#Range: 0.0 ~ 90.0
	BOW_INACCURACY = 1.8
	#Durability multiplier for items enchanted with Unbreaking
	#Range: 1.0 ~ 1.7976931348623157E308
	UNBREAKNG_DURABILITY_MULTIPLIER = 2.0
	#What enchantment causes Curios to be kept?
	#Set to a placeholder so that it doesn't crash if set to something modded that isn't loaded
	SOULBOUND_FOR_CURIOS = "sortilege:soulbound"

#Combat
[combat]
	#Disables critical attacks
	DISABLE_CRITS = true
	#Disables sweep attacks
	DISABLE_SWEEP_ATTACKS = true
	#Variates dealt damage by +-% this value
	#Range: 0.0 ~ 100.0
	RANDOM_DAMAGE_VARIATION = 15.0
	#How many armor points for damage to get reduced by 1 (for players)
	#Range: 0.0 ~ 1.7976931348623157E308
	ARMOR_POINT_REDUCTION_FACTOR = 2.0
	#Minimum damage dealt by an attack after all forms of reductions
	#Range: 0.0 ~ 100.0
	MIN_DAMAGE_TAKEN = 1.0
	#How many damage points per 1 durability lost on block
	#Range: 1.0 ~ 100.0
	ARMOR_DURABILITY_DAMAGE_FACTOR = 30.0
	#How many armor points for damage to get reduced by 1 (for entities)
	#Range: 0.0 ~ 1.7976931348623157E308
	ARMOR_POINT_REDUCTION_FACTOR_ENTITY = 2.0

#Campfires
[campfire]
	#Radius around the Campfire where players get the effect
	#Range: 0.0 ~ 64.0
	CAMPFIRE_HEAL_RADIUS = 16.0
	#Radius around a signal Campfire
	#Range: 0.0 ~ 64.0
	CAMPFIRE_HEAL_RADIUS_SIGNAL = 32.0

#Structures
[structures]
	#Minimum distance between structures
	#Range: 1 ~ 256
	MIN_STRUCTURE_DISTANCE = 32

[exhaustion_options]
	#Global exhaustion multiplier
	#Range: 0.0 ~ 10.0
	GLOBAL_MULTIPLIER = 0.5
	#DamageSource exhaustion type multiplier
	#Range: 0.0 ~ 10.0
	DAMAGE_TYPE_MULTIPLIER = 2.200000047683716
	#Jump multiplier
	#Range: 0.0 ~ 10.0
	JUMP_MULTIPLIER = 1.399999976158142
	#Swimming exhaustion multiplier
	#Range: 0.0 ~ 10.0
	SWIM_MULTIPLIER = 2.0
	#Underwater walking exhaustion multiplier
	#Range: 0.0 ~ 10.0
	UNDERWATER_WALK_MULTIPLIER = 1.5
	#Shallow water walking exhaustion multiplier
	#Range: 0.0 ~ 10.0
	SHALLOW_WATER_WALK_MULTIPLIER = 1.5
	#Sprinting exhaustion multiplier
	#Range: 0.0 ~ 10.0
	SPRINT_MULTIPLIER = 0.6399999856948853
	#Block mining exhaustion multiplier
	#Range: 0.0 ~ 10.0
	BLOCK_MINING_MULTIPLIER = 0.6600000262260437

