
#Enhanced Celestials Shader Support — client configuration
[general]
	#Master switch for the mod
	enabled = false
	#Verbose logging for troubleshooting
	debugMode = false
	#Simulate a lunar event regardless of EC state
	testMode = false
	#Event to simulate when testMode is true
	testEvent = "blood_moon"

#Global intensity multipliers. Defaults picked to address the 'flashbang' / eye-pain reports.
[intensity]
	#Global tint intensity (0.0 off, 1.0 default, up to 2.0)
	#Range: 0.0 ~ 2.0
	colorIntensity = 1.0
	#Global additive glow intensity
	#Range: 0.0 ~ 2.0
	glowIntensity = 1.0
	#Fade-in/out speed multiplier
	#Range: 0.1 ~ 5.0
	transitionSpeed = 1.0

#Per-event intensity multipliers (stacked on top of colorIntensity).
[events]
	bloodMoonEnabled = true
	blueMoonEnabled = true
	harvestMoonEnabled = true
	eclipseEnabled = true
	superMoonEnabled = true
	#Blood Moon intensity — lowered default to fix flashbang reports
	#Range: 0.0 ~ 2.0
	bloodMoonIntensity = 0.5
	#Blue Moon intensity — lowered default to fix flashbang reports
	#Range: 0.0 ~ 2.0
	blueMoonIntensity = 0.6
	#Range: 0.0 ~ 2.0
	harvestMoonIntensity = 0.8
	#Range: 0.0 ~ 2.0
	eclipseIntensity = 0.9
	#Super Moon intensity — raised default so the cool-silver tint is actually visible
	#Range: 0.0 ~ 2.0
	superMoonIntensity = 0.8
	#Range: 0.0 ~ 2.0
	crimsonMoonIntensity = 0.6

[network]
	networkSyncEnabled = true
	#Range: 1 ~ 100
	syncIntervalTicks = 10

[advanced]
	shaderDetectionEnabled = true
	#Apply the post-process tint even outside night — usually undesirable.
	applyDuringDay = false

