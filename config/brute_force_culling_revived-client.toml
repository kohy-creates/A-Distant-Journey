
["Sampling multiple"]
	#Range: 0.0 ~ 1.0
	multiple = 0.5

["Culling Map update delay"]
	#Range: 0 ~ 10
	"delay frame" = 1

["Cull entity"]
	enabled = true

["Cull block entity"]
	enabled = true

["Cull chunk"]
	enabled = true

["Async chunk rebuild"]
	enabled = true

["Auto disable async rebuild"]
	enabled = true

#Entity skip CULLING
["Entity ResourceLocation"]
	#Entities that skip culling, example: ["minecraft:creeper", "minecraft:zombie"]
	list = ["create:stationary_contraption", "witherstormmod:wither_storm"]

#Block Entity skip CULLING
["Block Entity ResourceLocation"]
	#Block entities that skip culling, example: ["minecraft:chest", "minecraft:mob_spawner"]
	list = ["minecraft:beacon"]

#Mod namespace skip CULLING
["Mod Namespace"]
	#Entire mods that skip culling (matched against ResourceLocation namespace). Use this for mods whose blocks/entities flicker or behave incorrectly with culling. Example: ["ars_nouveau", "botania"]
	list = ["ars_nouveau"]

